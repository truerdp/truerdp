services:
  db:
    image: postgres:16
    container_name: truerdp-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: truerdp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d truerdp"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: truerdp-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      CI: "true"
      DATABASE_URL: postgres://postgres:postgres@db:5432/truerdp
      PORT: 3003
    env_file:
      - apps/backend/.env
    ports:
      - "3003:3003"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - backend_node_modules:/app/apps/backend/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3003/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    command: ["pnpm", "--filter", "backend", "dev"]

volumes:
  db_data:
  root_node_modules:
  backend_node_modules:
