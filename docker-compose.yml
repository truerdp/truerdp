services:
  db:
    image: postgres:16
    container_name: truerdp-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: truerdp
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: truerdp-backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/truerdp
      PORT: 3003
    ports:
      - "3003:3003"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "CI=true PNPM_STORE_DIR=/tmp/.pnpm-store pnpm install && pnpm --filter backend dev"

volumes:
  db_data:
