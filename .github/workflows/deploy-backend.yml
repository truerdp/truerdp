name: Deploy backend

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-backend.yml"
      - "apps/backend/**"
      - "packages/**"
      - "docker-compose.prod.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
  workflow_dispatch:

concurrency:
  group: production-backend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrate and deploy backend
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      DEPLOY_HOST: ${{ secrets.DO_SSH_HOST }}
      DEPLOY_USER: ${{ secrets.DO_SSH_USER }}
      DEPLOY_KEY: ${{ secrets.DO_SSH_PRIVATE_KEY }}
      HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck backend
        run: pnpm --filter backend typecheck

      - name: Build backend
        run: pnpm --filter backend build

      - name: Check deployment secrets
        run: |
          set -euo pipefail

          if [ -z "$DATABASE_URL" ]; then
            echo "Missing PRODUCTION_DATABASE_URL secret."
            exit 1
          fi

          if [ -z "$DEPLOY_HOST" ]; then
            echo "Missing DO_SSH_HOST secret."
            exit 1
          fi

          if [ -z "$DEPLOY_USER" ]; then
            echo "Missing DO_SSH_USER secret."
            exit 1
          fi

          if [ -z "$DEPLOY_KEY" ]; then
            echo "Missing DO_SSH_PRIVATE_KEY secret."
            exit 1
          fi

      - name: Run migrations
        run: pnpm --filter backend db:migrate

      - name: Configure SSH
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on DigitalOcean VPS
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" <<'SSH'
            set -euo pipefail

            cd /opt/truerdp
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose -f docker-compose.prod.yml up -d --build --no-deps backend
            docker image prune -f
          SSH

      - name: Health check
        run: |
          set -euo pipefail

          url="${HEALTH_URL:-https://api.truerdp.com/}"
          curl --fail --show-error --silent --retry 12 --retry-delay 5 "$url"
