name: Migrate database

on:
  workflow_dispatch:

concurrency:
  group: production-database-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Run pending Drizzle migrations
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check database URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Missing PRODUCTION_DATABASE_URL secret."
            exit 1
          fi

      - name: Run migrations
        run: pnpm --filter backend db:migrate
