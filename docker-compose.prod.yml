services:
  db:
    image: postgres:16-alpine
    container_name: truerdp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-truerdp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-truerdp}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-truerdp} -d ${POSTGRES_DB:-truerdp}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.prod
    container_name: truerdp-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ${BACKEND_ENV_FILE:-apps/backend/.env.production.local}
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3003}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-truerdp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-truerdp}}
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-3003}:3003"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3003/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  db_data:
